<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuestros Recuerdos 💕</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  min-height: 100vh;
  background: #0d0010;
  font-family: 'Nunito', sans-serif;
  overflow-x: hidden;
}

.bg {
  position:fixed; inset:0; z-index:0;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(180,0,100,0.4) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(100,0,60,0.35) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(50,0,30,0.5) 0%, transparent 65%),
    #0d0010;
}

.hearts-bg { position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
.hb {
  position:absolute; opacity:0; font-size:1rem;
  animation: floatUp linear infinite;
}
@keyframes floatUp {
  0%   { opacity:0; transform: translateY(110vh) scale(.5) rotate(0deg); }
  10%  { opacity:.6; }
  90%  { opacity:.4; }
  100% { opacity:0; transform: translateY(-10vh) scale(1.2) rotate(360deg); }
}

header {
  position:relative; z-index:2;
  text-align:center; padding:60px 20px 36px;
}
.header-hearts {
  font-size:2rem; letter-spacing:6px;
  margin-bottom:16px;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { transform:scale(1); }
  50%      { transform:scale(1.08); }
}
.main-title {
  font-family:'Great Vibes', cursive;
  font-size: clamp(3rem, 10vw, 6rem);
  color:#ffd6e8;
  animation: glow 3s ease-in-out infinite;
  line-height:1.1;
}
@keyframes glow {
  0%,100% { text-shadow:0 0 20px rgba(255,182,214,.4), 0 0 50px rgba(255,100,160,.2); color:#ffd6e8; }
  50%      { text-shadow:0 0 40px rgba(255,182,214,.8), 0 0 80px rgba(255,100,160,.5); color:#fff0f8; }
}
.subtitle {
  font-size:1.1rem; color:#f9a8c9;
  margin-top:10px; opacity:.8; font-style:italic; letter-spacing:.06em;
}
.hdr-div {
  display:flex; align-items:center; gap:12px;
  max-width:420px; margin:24px auto 0;
}
.hdr-line { flex:1; height:1px; background:linear-gradient(90deg, transparent, rgba(255,168,201,.5), transparent); }

.grid-wrap {
  position:relative; z-index:2;
  max-width:1100px; margin:10px auto 60px; padding:0 16px;
}
.photo-grid {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap:18px;
}

.photo-card {
  background:linear-gradient(145deg, rgba(255,255,255,.06), rgba(255,150,200,.04));
  border:1px solid rgba(255,168,201,.2);
  border-radius:16px;
  padding:10px;
  cursor:default;
  opacity:0;
  animation: cardIn .6s ease forwards;
  transition: transform .3s ease, box-shadow .3s ease, border-color .3s ease;
}
@keyframes cardIn {
  from { opacity:0; transform:translateY(30px) scale(.95); }
  to   { opacity:1; transform:translateY(0) scale(1); }
}
.photo-card:hover {
  transform:translateY(-8px) rotate(.5deg);
  box-shadow:0 20px 50px rgba(255,20,147,.25), 0 0 0 1px rgba(255,168,201,.4);
  border-color:rgba(255,168,201,.5);
}

.photo-wrap {
  position:relative; overflow:hidden; border-radius:10px;
  aspect-ratio:3/4;
  background:#1a0010;
}
.photo-wrap img {
  width:100%; height:100%;
  object-fit:cover;
  display:block;
  transition: transform .4s ease;
}
.photo-card:hover .photo-wrap img {
  transform:scale(1.05);
}

.photo-overlay {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  background:rgba(180,0,80,0);
  transition:background .3s ease;
}
.photo-card:hover .photo-overlay {
  background:rgba(180,0,80,.12);
}
.heart-float {
  font-size:2.5rem; opacity:0;
  transform:scale(.3);
  transition: opacity .3s ease, transform .3s ease;
}
.photo-card:hover .heart-float {
  opacity:1; transform:scale(1);
}

footer {
  position:relative; z-index:2;
  text-align:center; padding:40px 20px 50px;
  border-top:1px solid rgba(255,168,201,.12);
}
.footer-hearts { font-size:1.6rem; letter-spacing:5px; margin-bottom:12px; opacity:.7; }
.footer-text {
  font-family:'Great Vibes', cursive;
  font-size:2rem; color:#f9a8c9; opacity:.85;
}

@media(max-width:600px) {
  .photo-grid { grid-template-columns:1fr 1fr; gap:10px; }
  .photo-wrap { aspect-ratio:1/1; }
}
</style>
</head>
